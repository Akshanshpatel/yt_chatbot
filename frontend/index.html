<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Chatbot</title>

    <link rel="shortcut icon" href="youtube.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>YouTube Chatbot</h1>
        </header>

        <!-- Video Loader -->
        <div class="video-section">
            <input
                type="text"
                id="videoUrl"
                placeholder="Paste YouTube video URL..."
            >

            <button id="loadBtn">
                Load
            </button>
        </div>

        <!-- Chat Window -->
        <div class="chat-section">

            <div id="chatBox">

                <div class="message bot">
                    👋 Paste a YouTube video link and ask questions about its content.
                </div>

            </div>

            <!-- Input -->
            <div class="input-area">

                <input
                    type="text"
                    id="question"
                    placeholder="Message YouTube Chatbot..."
                >

                <button id="askBtn">
                    ➤
                </button>

            </div>

        </div>

    </div>

    <script src="brain.js"></script>

</body>
</html>
